<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Entry</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
    padding: 0;
}

h1{
    text-align: center;
    color: #2c3e50;
    margin-top: 40px;
}
.form-container{
    background-color: white;
    width: 90%;
    max-width: 500px;
    margin: 40px auto;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input[type="text"], input[type="number"]{
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 16px;
    transition: 0.3s;
}

input[type="text"]:focus, input[type="number"]:focus{
    border-color: #3498db;
    outline: none;
}

button{
    width: 100%;
    padding: 12px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #2980b9;
}

#view_link{
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #3498db;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

#view_link:hover{
    color: #2980b9;
}

@media(max-width: 500px){
    .form-container{
        padding: 20px;
    }
}
</style>

<script>
if (!localStorage.getItem("info")) {
    localStorage.setItem("info", JSON.stringify({}));
}

function submitEntry(){
    var f_name = document.getElementById("firstname").value;
    var m_name = document.getElementById("middlename").value;
    var l_name = document.getElementById("lastname").value;
    var age = document.getElementById("age").value;
    var phone = document.getElementById("mobile_no").value;

    if(!f_name || !phone){
        alert("First Name and Phone are required!");
        return;
    }

    var users = JSON.parse(localStorage.getItem("info")) || {};
    var id = Object.keys(users).length + 1;

    var user = {
        F_name: f_name,
        M_name: m_name,
        L_name: l_name,
        Age: age,
        Phone: phone
    };

    users[id] = user;
    localStorage.setItem("info", JSON.stringify(users));
    
    document.getElementById("firstname").value = "";
    document.getElementById("middlename").value = "";
    document.getElementById("lastname").value = "";
    document.getElementById("age").value = "";
    document.getElementById("mobile_no").value = "";

    alert("User added successfully!");
}
</script>

</head>

<body>

<h1>Add Entry</h1>

<div class="form-container">
    <label>First Name</label>
    <input type="text" id="firstname" placeholder="Enter Your First Name">

    <label>Middle Name</label>
    <input type="text" id="middlename" placeholder="Enter Your Middle Name">

    <label>Last Name</label>
    <input type="text" id="lastname" placeholder="Enter Your Last Name">

    <label>Age</label>
    <input type="number" id="age" placeholder="Enter Your Age">

    <label>Mobile No.</label>
    <input type="number" id="mobile_no" placeholder="Enter Your Mobile Number">

    <button type="button" onclick="submitEntry()">Add Entry</button>

    <a href="entry.html" id="view_link">View All Entries</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Entry</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f8;
}

h1{
    text-align:center;
}


table{
    border-collapse: collapse;
    width:80%;
    margin:auto;
    background:white;
}

th{
    background-color:#2c3e50;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background-color:#f2f2f2;
}

tr:hover{
    background-color:#e6f2ff;
}


#go_back{
    display:block;
    width:120px;
    margin:20px auto;
    padding:10px;
    text-align:center;
    background-color:#3498db;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

#go_back:hover{
    background-color:#2980b9;
}

</style>

<script>

function loadData(){

    var all = JSON.parse(localStorage.getItem("info")) || {};
    var table = document.getElementById("table_body");

    for(var id in all){

        var user = all[id];

        var row = `
        <tr>
            <td>${id}</td>
            <td>${user.F_name}</td>
            <td>${user.M_name}</td>
            <td>${user.L_name}</td>
            <td>${user.Age}</td>
            <td>${user.Phone}</td>
        </tr>
        `;

        table.innerHTML += row;
    }

}

</script>

</head>

<body onload="loadData()">

<h1>All Entry</h1>

<br>

<table>

<thead>
<tr>
<th>ID</th>
<th>First Name</th>
<th>Middle Name</th>
<th>Last Name</th>
<th>Age</th>
<th>Phone</th>
</tr>
</thead>

<tbody id="table_body">

</tbody>

</table>

<a href="home.html" id="go_back">Go Back</a>

</body>
</html>
